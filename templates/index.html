<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- Metadatos y Open Graph Actualizados -->
    <title>SnapDrop | Descargador Minimalista</title>
    <meta name="description" content="Descarga videos, audios e imágenes de tus redes sociales favoritas al instante y sin complicaciones.">
    <meta name="theme-color" content="#007AFF">

    <meta property="og:title" content="SnapDrop | Descargador Universal">
    <meta property="og:description" content="Guarda contenido de TikTok, Instagram, X y Pinterest. Calidad original, rápido y sin marcas de agua.">
    
    <!-- Tu nueva URL definitiva -->
    <meta property="og:url" content="https://snapdrop-dl.onrender.com/">
    
    <meta property="og:type" content="website">
    <meta property="og:image" content="https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=1200&auto=format&fit=crop">

    <link rel="manifest" href="/static/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Enlace al archivo CSS externo -->
    <link rel="stylesheet" href="/static/style.css">
</head>
<body id="cuerpo">
    <div id="toast-container" class="toast-container"></div>

    <div class="contenedor">
        <div class="brand">Snap<span>Drop</span></div>

            <svg title="Instagram" viewBox="0 0 24 24"><path d="M12 2.16c3.2 0 3.58.01 4.85.07 3.25.15 4.77 1.69 4.92 4.92.06 1.27.07 1.65.07 4.85s-.01 3.58-.07 4.85c-.15 3.23-1.66 4.77-4.92 4.92-1.27.06-1.64.07-4.85.07s-3.58-.01-4.85-.07c-3.26-.15-4.77-1.7-4.92-4.92-.06-1.27-.07-1.64-.07-4.85s.01-3.58.07-4.85C2.38 3.86 3.89 2.32 7.15 2.23c1.27-.06 1.64-.07 4.85-.07M12 0C8.74 0 8.33.01 7.05.07c-4.27.19-6.78 2.7-6.97 6.98C.01 8.33 0 8.74 0 12s.01 3.67.08 4.95c.19 4.28 2.7 6.79 6.97 6.98C8.33 23.99 8.74 24 12 24s3.67-.01 4.95-.08c4.28-.19 6.79-2.7 6.98-6.98C23.99 15.67 24 15.26 24 12s-.01-3.67-.08-4.95c-.19-4.28-2.7-6.79-6.98-6.97C15.67.01 15.26 0 12 0zm0 5.84A6.16 6.16 0 1 0 18.16 12 6.16 6.16 0 0 0 12 5.84zm0 10.16A4 4 0 1 1 16 12a4 4 0 0 1-4 4zm7.85-11.44a1.44 1.44 0 1 1-2.88 0 1.44 1.44 0 0 1 2.88 0z"/></svg>
            <svg title="X" viewBox="0 0 24 24"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>

            <svg title="Pinterest" viewBox="0 0 24 24"><path d="M12.017 0C5.396 0 .029 5.367.029 11.987c0 5.079 3.158 9.417 7.618 11.162-.105-.949-.199-2.403.041-3.439.219-.937 1.406-5.957 1.406-5.957s-.359-.72-.359-1.781c0-1.663.967-2.911 2.168-2.911 1.024 0 1.518.769 1.518 1.688 0 1.029-.653 2.567-.992 3.992-.285 1.193.6 2.165 1.775 2.165 2.128 0 3.768-2.245 3.768-5.487 0-2.861-2.063-4.869-5.008-4.869-3.41 0-5.409 2.562-5.409 5.199 0 1.033.394 2.143.889 2.741.099.12.112.225.085.345-.09.375-.293 1.199-.334 1.363-.053.225-.172.271-.401.165-1.495-.69-2.433-2.878-2.433-4.646 0-3.776 2.748-7.252 7.951-7.252 4.168 0 7.392 2.967 7.392 6.923 0 4.135-2.607 7.462-6.233 7.462-1.214 0-2.354-.629-2.758-1.379l-.749 2.848c-.269 1.045-1.004 2.352-1.498 3.146 1.123.345 2.306.535 3.55.535 6.607 0 11.985-5.365 11.985-11.987C23.97 5.367 18.592 0 12.017 0z"/></svg>
        </div>
        
        <form id="form-ajax">
            <div class="input-group">
                <input type="url" id="input-enlace" name="enlace" placeholder="Pega el enlace aquí..." required autocomplete="off">
                <button type="button" class="btn-pegar" id="btn-pegar" title="Pegar del portapapeles">📋</button>
            </div>
            
            <select name="calidad" id="select-calidad">
                <option value="alta">Video - Máxima Calidad</option>
                <option value="media">Video - Calidad Media (Ahorro de datos)</option>
                <option value="baja">Video - Calidad Baja (Descarga rápida)</option>
                <option value="audio">Solo Audio (MP3)</option>
                <option value="imagen">Solo Imagen / Foto del post</option>
            </select>
            
            <button type="submit" class="btn-main" id="btn-generar" disabled>Generar Descarga</button>
        </form>

        <div class="progress-container" id="p-cont">
            <div class="progress-bar" id="p-bar"></div>
        </div>
        <p id="status-text">Analizando...</p>

        <div id="resultado-dinamico"></div>

        <div class="historial">
            <div class="historial-header" style="display:flex; justify-content:space-between; align-items: center; margin-bottom: 10px;">
                <h2 style="font-size: 14px; font-weight: 600; color: var(--text-secondary); margin: 0; text-transform: uppercase; letter-spacing: 0.5px;">Recientes</h2>
                <button id="btn-limpiar" style="background:none; border:none; color:var(--danger); cursor:pointer; font-weight:600; font-size: 13px; transition: 0.2s;">🗑️ Limpiar</button>
            </div>
            <ul id="lista-historial" style="list-style:none; padding:0; margin: 0;"></ul>
        </div>
    </div>

    <div class="theme-switcher-container">
        <button class="theme-btn" onclick="toggleDarkMode()" title="Cambiar tema">🌓</button>
        <button id="btn-install" title="Instalar como Aplicación">📱 Instalar App</button>
    </div>

    <!-- Enlace al archivo JS externo -->
    <script src="/static/app.js"></script>
</body>
</html>
