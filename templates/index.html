<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SnapDrop - Descarga Veloz</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #007AFF; --bg: #ffffff; --text: #1d1d1f; --gray: #f5f5f7; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); display: flex; justify-content: center; padding-top: 10vh; margin: 0; }
        .card { width: 100%; max-width: 400px; padding: 40px; text-align: center; }
        .logo { font-size: 32px; font-weight: 800; letter-spacing: -1px; margin-bottom: 30px; }
        .logo span { color: var(--accent); }
        input { width: 100%; padding: 16px; border-radius: 12px; border: 1px solid #d2d2d7; background: var(--gray); font-size: 16px; outline: none; box-sizing: border-box; }
        button { width: 100%; padding: 16px; background: var(--text); color: white; border: none; border-radius: 12px; font-weight: 600; margin-top: 15px; cursor: pointer; transition: 0.2s; }
        button:disabled { opacity: 0.3; }
        
        /* ESTILO BARRA DE PROGRESO */
        .progress-container { width: 100%; background: var(--gray); height: 8px; border-radius: 10px; margin-top: 25px; display: none; overflow: hidden; }
        .progress-bar { width: 0%; height: 100%; background: var(--accent); transition: 0.3s; }
        
        #status-text { font-size: 13px; color: #86868b; margin-top: 8px; display: none; }
        .result { margin-top: 30px; animation: fadeIn 0.5s; }
        @keyframes fadeIn { from { opacity:0; transform: translateY(10px); } to { opacity:1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">Snap<span>Drop</span></div>
        <form id="dl-form">
            <input type="url" id="url" placeholder="Pega el link aquí..." required>
            <button type="submit" id="btn">Descargar</button>
        </form>

        <div class="progress-container" id="p-cont">
            <div class="progress-bar" id="p-bar"></div>
        </div>
        <p id="status-text">Analizando...</p>

        <div id="result" class="result"></div>
    </div>

    <script>
        const form = document.getElementById('dl-form');
        const pCont = document.getElementById('p-cont');
        const pBar = document.getElementById('p-bar');
        const status = document.getElementById('status-text');

        form.onsubmit = async (e) => {
            e.preventDefault();
            document.getElementById('btn').disabled = true;
            pCont.style.display = 'block';
            status.style.display = 'block';
            
            // Conectamos al canal de progreso
            const eventSource = new EventSource('/progreso');
            eventSource.onmessage = (event) => {
                const data = JSON.parse(event.data);
                pBar.style.width = data.porcentaje + '%';
                status.innerText = `Descargando... ${Math.round(data.porcentaje)}%`;
                if(data.porcentaje >= 100) eventSource.close();
            };

            const formData = new FormData();
            formData.append('enlace', document.getElementById('url').value);

            const res = await fetch('/procesar', { method: 'POST', body: formData });
            const final = await res.json();

            if(final.status === 'success') {
                document.getElementById('result').innerHTML = `
                    <p style="font-weight:600;">${final.titulo}</p>
                    <a href="${final.url_descarga}" style="color:var(--accent); text-decoration:none; font-weight:700;">¡CLICK AQUÍ PARA GUARDAR!</a>
                `;
            } else {
                alert(final.message);
            }
            document.getElementById('btn').disabled = false;
        };
    </script>
</body>
</html>
